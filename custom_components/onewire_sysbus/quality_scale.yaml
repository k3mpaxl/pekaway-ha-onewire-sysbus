# 1-Wire SysBus Integration — HA Integration Quality Scale status

rules:
  # ------------------------------------------------------------------ BRONZE
  action-setup:
    status: exempt
    comment: Integration registers no services.
  appropriate-polling: done
  brands:
    status: todo
    comment: PR against home-assistant/brands for "onewire_sysbus" pending.
  common-modules: done
  config-flow: done
  config-flow-test-coverage:
    status: todo
    comment: tests/components/onewire_sysbus/ not yet implemented.
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: No services.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions:
    status: todo
  entity-event-setup:
    status: exempt
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # ------------------------------------------------------------------ SILVER
  action-exceptions:
    status: exempt
    comment: No services.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: No credentials — local filesystem only.
  test-coverage:
    status: todo

  # ------------------------------------------------------------------ GOLD
  devices: done
  diagnostics: done
  discovery:
    status: todo
    comment: |
      Could auto-detect /sys/bus/w1/devices/ via startup check; currently manual.
  discovery-update-info:
    status: exempt
  docs-data-update: done
  docs-examples: done
  docs-known-limitations:
    status: todo
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: todo
    comment: |
      Hotplug of 1-Wire sensors at runtime is not yet reflected — rediscovery
      happens only on reload.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations:
    status: exempt
    comment: No user-facing exceptions raised.
  icon-translations:
    status: exempt
  reconfiguration-flow: done
  repair-issues:
    status: todo
    comment: Could raise repair when mount dir disappears.
  stale-devices:
    status: todo
    comment: |
      Devices that vanish from the bus remain in the device registry until
      manual removal.

  # ------------------------------------------------------------------ PLATINUM
  async-dependency:
    status: todo
    comment: pi1wire is blocking; calls are wrapped in the executor.
  inject-websession:
    status: exempt
  strict-typing:
    status: todo
